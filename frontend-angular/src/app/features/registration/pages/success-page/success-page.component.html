<app-registration-shell
  title="Registration Complete"
  subtitle="Your account has been created successfully."
  badgeText="All Set"
>
  <div class="registration-success">
    <div class="registration-success__icon">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <p class="registration-success__message">
      Thank you for registering with Time4Wellbeing. You can now sign in with your email address and password.
    </p>
  </div>

  <div class="registration-actions registration-actions--stack">
    <a class="btn registration-button registration-button--primary" href="/Account/Login">Go to Sign In</a>
  </div>
</app-registration-shell>
