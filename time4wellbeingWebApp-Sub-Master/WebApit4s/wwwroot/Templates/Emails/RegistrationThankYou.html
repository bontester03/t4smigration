<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Thanks for registering</title>
</head>
<body style="font-family:Segoe UI, Roboto, Arial, sans-serif; color:#222;">
    <div style="max-width:600px;margin:0 auto;padding:16px">
        <h2 style="margin:0 0 12px;">Thank you for registering</h2>
        <p>Hi {{ParentName}},</p>

        <p>We’ve received your registration details for the following child(ren):</p>
        <ul style="padding-left:18px; margin:8px 0;">
            {{ChildrenList}}
        </ul>

        <p style="margin:12px 0;">
            <strong>School:</strong> {{School}}<br />
            <strong>Class:</strong> {{Class}}
        </p>

        <p>If you need to update any information, just reply to this email info@time4sportuk.com.</p>

        <p style="margin-top:24px;">Best wishes,<br />Time4Wellbeing Team</p>
    </div>
</body>
</html>
